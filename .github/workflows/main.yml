name: Build and Commit JAR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Find and copy JAR
        id: jar
        run: |
          JAR_FILE=$(find target -name "*.jar" -type f -maxdepth 1 | head -n 1)
          cp "$JAR_FILE" ./XMDoubleJump.jar

      - name: Commit and push JAR
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add XMDoubleJump.jar
          git commit -m "Update XMDoubleJump.jar [skip ci]" || echo "No changes to commit"
          git push
