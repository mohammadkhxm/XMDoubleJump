name: Build and Release Plugin

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Find JAR file
        id: find_jar
        run: |
          JAR_PATH=$(find target -name "*.jar" -type f | head -n 1)
          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR_PATH)" >> $GITHUB_OUTPUT

      - name: Rename JAR for release
        run: |
          mkdir -p release
          cp ${{ steps.find_jar.outputs.jar_path }} release/${{ steps.find_jar.outputs.jar_name }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmdoublejump-jar
          path: ${{ steps.find_jar.outputs.jar_path }}

      - name: Upload release JAR
        uses: actions/upload-artifact@v4
        with:
          name: xmdoublejump-release
          path: release/${{ steps.find_jar.outputs.jar_name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: xmdoublejump-release
          path: ./release

      - name: Find JAR in release folder
        id: find_release_jar
        run: |
          JAR_PATH=$(find ./release -name "*.jar" -type f | head -n 1)
          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR_PATH)" >> $GITHUB_OUTPUT

      - name: Rename for public release
        run: |
          cp ${{ steps.find_release_jar.outputs.jar_path }} ./XMDoubleJump-${{ github.ref_name }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: ./XMDoubleJump-${{ github.ref_name }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
